<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W2TD Load Tester</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0d0d;
    --surface:  #1a1a1a;
    --surface2: #242424;
    --border:   #2e2e2e;
    --text:     #e8e8e8;
    --muted:    #666;
    --primary:  #4f8ef7;
    --success:  #3ecf8e;
    --warning:  #f5a623;
    --danger:   #e05252;
    --radius:   8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 13px;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
  header .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 20px;
    background: var(--primary); color: #fff; font-weight: 600; letter-spacing: 0.05em;
  }
  header .ver { font-size: 10px; color: var(--muted); margin-left: auto; }

  /* ── Control Panel ───────────────────────────────────── */
  .control-panel {
    display: flex; flex-wrap: wrap; gap: 12px;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); align-items: flex-end;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-size: 11px; color: var(--muted); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .field input[type="text"],
  .field input[type="number"] {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius);
    padding: 8px 10px; font-size: 13px; outline: none;
  }
  .field input:focus { border-color: var(--primary); }
  .field input[type="text"] { width: 280px; }
  .field input[type="number"] { width: 80px; }

  .slider-row { display: flex; align-items: center; gap: 8px; }
  input[type="range"] {
    -webkit-appearance: none; width: 140px; height: 4px;
    background: var(--border); border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--primary); cursor: pointer;
  }
  .slider-val {
    width: 54px; font-size: 13px; font-weight: 600; color: var(--primary);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 4px 6px; text-align: center;
    outline: none; -moz-appearance: textfield;
  }
  .slider-val::-webkit-inner-spin-button,
  .slider-val::-webkit-outer-spin-button { -webkit-appearance: none; }
  .slider-val:focus { border-color: var(--primary); }

  .btn {
    padding: 8px 20px; border-radius: var(--radius); border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-danger  { background: var(--danger);  color: #fff; }
  .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .control-actions { display: flex; gap: 8px; align-items: flex-end; margin-left: auto; }

  /* ── Stats Bar ───────────────────────────────────────── */
  .stats-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .stat {
    flex: 1; padding: 10px 16px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat:last-child { border-right: none; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-size: 18px; font-weight: 700; line-height: 1; }
  .stat-value.green { color: var(--success); }
  .stat-value.blue  { color: var(--primary); }
  .stat-value.muted { color: var(--muted); }

  /* ── Client Grid ─────────────────────────────────────── */
  .grid-container { flex: 1; padding: 16px 20px; overflow-y: auto; }
  .client-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  .client-card {
    background: var(--surface); border: 1px solid var(--border);
    border-top: 2px solid var(--border); border-radius: var(--radius);
    padding: 12px; display: flex; flex-direction: column; gap: 5px;
    cursor: pointer; transition: border-color 0.15s;
    user-select: none;
  }
  .client-card:hover { border-color: #444; }
  .client-card.connected  { border-top-color: var(--success); }
  .client-card.connecting { border-top-color: var(--warning); }
  .client-card.rejected   { border-top-color: var(--danger);  }
  .client-card.error      { border-top-color: var(--danger);  }
  .client-card.idle       { border-top-color: var(--muted);   }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-id { font-size: 11px; font-weight: 700; color: var(--muted); }
  .card-header-right { display: flex; align-items: center; gap: 5px; }

  /* ── Card toggle button ──────────────────────────────── */
  .card-btn {
    width: 20px; height: 20px; background: transparent;
    border: 1px solid var(--border); color: var(--muted);
    border-radius: 4px; font-size: 9px; cursor: pointer;
    padding: 0; line-height: 1; display: flex; align-items: center;
    justify-content: center; transition: all 0.15s; flex-shrink: 0;
  }
  .card-btn:hover { border-color: var(--primary); color: var(--primary); }
  .client-card.idle .card-btn, .client-card.stopped .card-btn,
  .client-card.error .card-btn { border-color: var(--muted); }
  .client-card.connecting .card-btn { border-color: var(--warning); color: var(--warning); }
  .client-card.connected  .card-btn { border-color: var(--success); color: var(--success); }

  .card-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .connected  .card-dot { background: var(--success); }
  .connecting .card-dot { background: var(--warning); animation: pulse 1s infinite; }
  .rejected   .card-dot, .error .card-dot { background: var(--danger); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .card-slot { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; }
  .card-slot.none { color: var(--muted); font-size: 13px; font-weight: 400; }
  .card-status { font-size: 11px; color: var(--muted); }
  .connected  .card-status { color: var(--success); }
  .connecting .card-status { color: var(--warning); }
  .rejected   .card-status, .error .card-status { color: var(--danger); }
  .card-packets { font-size: 11px; color: var(--muted); }
  .card-phase { font-size: 10px; color: #444; min-height: 14px; }
  .card-hz { font-size: 10px; color: var(--muted); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state p { font-size: 14px; margin-bottom: 6px; }
  .empty-state small { font-size: 12px; }

  /* ── Log Footer ──────────────────────────────────────── */
  .log-footer {
    height: 100px; background: var(--surface); border-top: 1px solid var(--border);
    overflow-y: auto; padding: 8px 16px; font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace; color: var(--muted);
    display: flex; flex-direction: column-reverse;
  }
  .log-line { padding: 1px 0; }
  .log-line.info  { color: var(--muted); }
  .log-line.ok    { color: var(--success); }
  .log-line.warn  { color: var(--warning); }
  .log-line.error { color: var(--danger); }
  .log-ts { color: #444; margin-right: 6px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>W2TD Load Tester</h1>
  <span class="badge">DEV TOOL</span>
  <span class="ver">v2 · Physics Sim</span>
</header>

<div class="control-panel">
  <div class="field">
    <label>TouchDesigner WebSocket URL</label>
    <input type="text" id="url-input" placeholder="wss://xxxx.trycloudflare.com" spellcheck="false">
  </div>

  <div class="field">
    <label>Virtual Devices</label>
    <div class="slider-row">
      <input type="range" id="client-slider" min="1" max="100" value="5">
      <input type="number" class="slider-val" id="client-count-label" min="1" max="100" value="5">
    </div>
  </div>

  <div class="field">
    <label>Stagger delay (ms)</label>
    <input type="number" id="stagger-input" value="200" min="0" max="2000">
  </div>

  <div class="control-actions">
    <button class="btn btn-ghost" id="btn-clear" disabled>Clear</button>
    <button class="btn btn-danger" id="btn-stop" disabled>Stop All</button>
    <button class="btn btn-primary" id="btn-start">Start All</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-label">Connected</span>
    <span class="stat-value green" id="stat-connected">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Target</span>
    <span class="stat-value blue" id="stat-target">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Packets / sec</span>
    <span class="stat-value blue" id="stat-pps">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Total Packets</span>
    <span class="stat-value muted" id="stat-total">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Elapsed</span>
    <span class="stat-value muted" id="stat-elapsed">00:00</span>
  </div>
</div>

<div class="grid-container">
  <div class="client-grid" id="client-grid"></div>
</div>

<div class="log-footer" id="log-footer"></div>

<!-- ─────────────────────────────────────────────────────── -->
<!-- Web Worker — WebSocket + realistic physics sensor sim  -->
<!-- ─────────────────────────────────────────────────────── -->
<script id="worker-code" type="javascript/worker">
'use strict';

// ── Physics constants ─────────────────────────────────────────
const G   = 9.81;   // m/s²
const DEG = Math.PI / 180;

function rand(a, b)      { return a + Math.random() * (b - a); }
function clamp(v, lo, hi){ return v < lo ? lo : v > hi ? hi : v; }

// ── Realistic Sensor Generator ────────────────────────────────
// Models a person holding a phone in portrait mode.
// Orientation (beta/gamma) drives the gravity vector → accelerometer.
// Gyroscope is derived from the rate of orientation change.
//
// States:
//   rest  — nearly still, hand tremor only (~0.2 m/s²)
//   tilt  — purposeful orientation change (picking up, looking at screen)
//   shake — short burst of movement (notification tap, gesture)
//   walk  — rhythmic 1.8 Hz step oscillation
class SensorGen {
  constructor() {
    // ── Orientation (degrees) — baseline: vertical portrait hold
    this.beta  = rand(68, 84);   // ob: forward-back tilt; 70-82° ≈ upright portrait
    this.gamma = rand(-8, 8);    // og: lateral tilt; near 0 = straight up
    this.alpha = rand(0, 360);   // oa: compass heading; random start

    this.targetBeta  = this.beta;
    this.targetGamma = this.gamma;
    this.prevBeta    = this.beta;
    this.prevGamma   = this.gamma;
    this.prevAlpha   = this.alpha;

    // ── Phase state machine
    this.phase         = 'rest';
    this.phaseTimer    = 0;
    this.phaseDuration = Math.floor(rand(4, 10) * 30); // frames @ 30 Hz

    // ── Walk sub-state
    this.walkTime = 0;

    // ── Per-instance "personality" — keeps devices visually distinct
    this.moveFreq = rand(0.12, 0.38); // how often it moves (probability gate)
    this.moveMag  = rand(0.6, 1.8);   // intensity multiplier
    this.walkProb = rand(0.05, 0.20); // probability of walk phase

    // ── GPS (Seoul area, slight offset per device)
    this.lat = 37.5665 + rand(-0.015, 0.015);
    this.lon = 126.978  + rand(-0.008, 0.008);

    // ── Output values (filled by tick)
    this.ax = 0; this.ay = -G; this.az = 0;
    this.ga = 0; this.gb  = 0; this.gg  = 0;
    this.oa = this.alpha; this.ob = this.beta; this.og = this.gamma;

    // Initial tick to fill outputs
    this._computeAccel();
  }

  tick() {
    // ── Phase timer
    this.phaseTimer++;
    if (this.phaseTimer >= this.phaseDuration) {
      this._nextPhase();
    }
    if (this.phase === 'walk') this.walkTime += 1 / 30;

    // ── Smooth orientation lerp toward target
    const lerpRate = this.phase === 'tilt' ? 0.10 : 0.012;
    this.beta  += (this.targetBeta  - this.beta)  * lerpRate + rand(-0.06, 0.06);
    this.gamma += (this.targetGamma - this.gamma) * lerpRate + rand(-0.05, 0.05);
    // Compass: slow natural drift
    this.alpha  = (this.alpha + rand(-0.35, 0.35) + 360) % 360;

    this.beta  = clamp(this.beta,  -90, 180);
    this.gamma = clamp(this.gamma, -90, 90);

    // ── Gyroscope — angular velocity from orientation delta (deg/s)
    const HZ   = 30;
    const dBeta  = this.beta  - this.prevBeta;
    const dGamma = this.gamma - this.prevGamma;
    const dAlpha = ((this.alpha - this.prevAlpha + 540) % 360) - 180;
    const gNoise = this.phase === 'shake' ? 10 :
                   this.phase === 'tilt'  ? 4  :
                   this.phase === 'walk'  ? 3  : 1.2;
    this.ga = clamp(dAlpha * HZ + rand(-gNoise, gNoise), -360, 360);
    this.gb = clamp(dBeta  * HZ + rand(-gNoise, gNoise), -360, 360);
    this.gg = clamp(dGamma * HZ + rand(-gNoise, gNoise), -360, 360);

    this.prevBeta  = this.beta;
    this.prevGamma = this.gamma;
    this.prevAlpha = this.alpha;

    this._computeAccel();

    // ── Orientation output
    this.oa = this.alpha;
    this.ob = this.beta;
    this.og = this.gamma;

    // ── GPS: slow drift when walking
    if (this.phase === 'walk') {
      this.lat += rand(-0.0000028, 0.0000028); // ~0.3 m step
      this.lon += rand(-0.0000040, 0.0000040);
    }
  }

  _computeAccel() {
    // Gravity vector in device frame — W3C DeviceMotion convention:
    //   R = Rz(α)·Rx(β)·Ry(γ),  world gravity = [0, 0, -g_world]
    //   g_device = Ry(-γ)·Rx(-β) · [0, 0, -g]
    //   gx =  G · sin(γ) · cos(β)
    //   gy = -G · sin(β)
    //   gz = -G · cos(β) · cos(γ)
    const b = this.beta  * DEG;
    const g = this.gamma * DEG;
    const gravX =  G * Math.sin(g) * Math.cos(b);
    const gravY = -G * Math.sin(b);
    const gravZ = -G * Math.cos(b) * Math.cos(g);

    // Linear acceleration added on top of gravity
    const m = this.moveMag;
    let lx = 0, ly = 0, lz = 0;

    if (this.phase === 'shake') {
      // Decaying burst: strongest at start, fades
      const t = this.phaseTimer / Math.max(1, this.phaseDuration);
      const amp = Math.max(0, 1 - t * 1.6) * 3.5 * m;
      lx = rand(-amp, amp);
      ly = rand(-amp, amp);
      lz = rand(-amp * 0.6, amp * 0.6);
    } else if (this.phase === 'walk') {
      // ~1.8 Hz vertical bounce + 0.9 Hz lateral sway
      const t = this.walkTime;
      ly += Math.sin(t * 2 * Math.PI * 1.8) * 2.2 * m;
      lx += Math.sin(t * 2 * Math.PI * 0.9) * 0.7 * m;
      lz += Math.cos(t * 2 * Math.PI * 1.8) * 0.9 * m;
      lx += rand(-0.25, 0.25);
      ly += rand(-0.3,  0.3);
    } else {
      // Rest / tilt: hand tremor only
      const tremor = this.phase === 'tilt' ? 0.35 : 0.18;
      lx = rand(-tremor, tremor) * m;
      ly = rand(-tremor, tremor) * m;
      lz = rand(-tremor * 0.6, tremor * 0.6) * m;
    }

    // Sensor reading = gravity + linear accel.  Range: ±19.6 m/s² (2 G)
    this.ax = clamp(gravX + lx, -19.6, 19.6);
    this.ay = clamp(gravY + ly, -19.6, 19.6);
    this.az = clamp(gravZ + lz, -19.6, 19.6);
  }

  _nextPhase() {
    this.phaseTimer = 0;
    const r = Math.random();

    if (this.phase !== 'rest') {
      // Always return to rest after any active phase
      this.phase         = 'rest';
      this.phaseDuration = Math.floor(rand(4, 12) * 30);
      this.targetBeta    = rand(68, 84);
      this.targetGamma   = rand(-8, 8);
      return;
    }

    // From rest — decide next phase
    const totalMoveProb = this.moveFreq;
    if (r < totalMoveProb * 0.50) {
      // Tilt: purposeful angle change (looking at angle, comparing, etc.)
      this.phase         = 'tilt';
      this.phaseDuration = Math.floor(rand(0.8, 3.5) * 30);
      this.targetBeta    = clamp(this.beta  + rand(-35, 35), 20, 120);
      this.targetGamma   = clamp(this.gamma + rand(-25, 25), -60, 60);
    } else if (r < totalMoveProb * 0.80) {
      // Shake: tap, notification, quick gesture
      this.phase         = 'shake';
      this.phaseDuration = Math.floor(rand(0.25, 1.2) * 30);
    } else if (r < totalMoveProb) {
      // Walk: person stands up and moves around
      this.phase         = 'walk';
      this.phaseDuration = Math.floor(rand(3, 10) * 30);
      this.walkTime      = 0;
      this.targetBeta    = rand(72, 88); // slightly more upright when walking
      this.targetGamma   = rand(-10, 10);
    } else {
      // Stay resting (longer pause)
      this.phaseDuration = Math.floor(rand(3, 12) * 30);
    }
  }

  get phaseName() {
    const labels = { rest: '🧘 rest', tilt: '↕ tilt', shake: '⚡ shake', walk: '🚶 walk' };
    return labels[this.phase] || this.phase;
  }
}

// ── Virtual Client ────────────────────────────────────────────
const clients = new Map(); // id → VClient
let logs = [];

function sendMsg(msg) { postMessage(msg); }
function logLine(level, text) {
  const d = new Date();
  logs.push({ level, text, ts: d.toTimeString().slice(0, 8) });
  if (logs.length > 120) logs.shift();
}
function r3(v) { return Math.round(v * 1000) / 1000; }
function r4(v) { return Math.round(v * 10000) / 10000; }

class VClient {
  constructor(id, url) {
    this.id  = id;
    this.url = url;
    this.ws  = null;
    this.slot   = null;
    this.status = 'idle';
    this.cfg = {
      sample_rate: 30,
      sensor_motion: 1, sensor_orientation: 1,
      sensor_geolocation: 0, sensor_touch: 1,
    };
    this.packetsSent   = 0;
    this.gen           = new SensorGen();
    this._jitterTO     = null;
    this.sensorTimer   = null;
    this.pingTimer     = null;
    this._dead         = false;
  }

  connect() {
    if (this._dead) return;
    this._setStatus('connecting');
    try { this.ws = new WebSocket(this.url); }
    catch(e) {
      this._setStatus('error');
      logLine('error', `#${this.id} WebSocket error: ${e.message}`);
      return;
    }
    this.ws.onopen    = ()   => { if (this._dead) return this.ws.close(); this._send('{"type":"hello"}'); };
    this.ws.onmessage = (ev) => { let m; try { m = JSON.parse(ev.data); } catch(_){ return; } this._onMsg(m); };
    this.ws.onerror   = ()   => { if (!this._dead) this._setStatus('error'); };
    this.ws.onclose   = ()   => {
      this._stopTimers();
      if (!this._dead && this.status !== 'stopped') this._setStatus('error');
    };
  }

  _onMsg(m) {
    if (m.type === 'ack') {
      this.slot = m.slot;
      this._setStatus('connected');
      logLine('ok', `#${this.id} → slot ${this.slot}`);
      this._sendIntro();
      this._startSensorLoop();
      this._startPing();
    } else if (m.type === 'config') {
      const prev = this.cfg.sample_rate;
      if (m.sample_rate        != null) this.cfg.sample_rate        = m.sample_rate;
      if (m.sensor_motion      != null) this.cfg.sensor_motion      = m.sensor_motion;
      if (m.sensor_orientation != null) this.cfg.sensor_orientation = m.sensor_orientation;
      if (m.sensor_geolocation != null) this.cfg.sensor_geolocation = m.sensor_geolocation;
      if (m.sensor_touch       != null) this.cfg.sensor_touch       = m.sensor_touch;
      if (prev !== this.cfg.sample_rate) {
        this._stopSensorLoop();
        if (this.status === 'connected') this._startSensorLoop();
      }
    } else if (m.type === 'rejected') {
      this._setStatus('rejected');
      logLine('warn', `#${this.id} rejected — server full`);
      this._stopTimers();
    }
  }

  _sendIntro() {
    this._send(`{"type":"client_name","name":"VDevice-${this.id}"}`);
    this._send('{"type":"screen_info","width":390,"height":844,"physicalWidth":1170,"physicalHeight":2532,"devicePixelRatio":3}');
  }

  _startSensorLoop() {
    const hz = Math.max(1, Math.min(120, this.cfg.sample_rate));
    const interval = 1000 / hz;
    // Random jitter to avoid all clients firing at the same instant
    this._jitterTO = setTimeout(() => {
      this.sensorTimer = setInterval(() => {
        if (this.status !== 'connected') return;
        this.gen.tick();
        const c = this.cfg, s = this.gen;
        let parts = '"type":"sensor"';
        if (c.sensor_motion) {
          parts += `,"ax":${r3(s.ax)},"ay":${r3(s.ay)},"az":${r3(s.az)}`;
          parts += `,"ga":${r3(s.ga)},"gb":${r3(s.gb)},"gg":${r3(s.gg)}`;
        }
        if (c.sensor_orientation) {
          parts += `,"oa":${r3(s.oa)},"ob":${r3(s.ob)},"og":${r3(s.og)}`;
        }
        if (c.sensor_geolocation) {
          parts += `,"lat":${r4(s.lat)},"lon":${r4(s.lon)}`;
        }
        this._send('{' + parts + '}');
      }, interval);
    }, Math.random() * interval);
  }

  _stopSensorLoop() {
    if (this._jitterTO)   { clearTimeout(this._jitterTO);    this._jitterTO   = null; }
    if (this.sensorTimer) { clearInterval(this.sensorTimer); this.sensorTimer = null; }
  }

  _startPing() {
    this.pingTimer = setInterval(() => this._send('{"type":"ping"}'), 5000);
  }

  _stopTimers() {
    this._stopSensorLoop();
    if (this.pingTimer) { clearInterval(this.pingTimer); this.pingTimer = null; }
  }

  _send(str) {
    if (!this.ws || this.ws.readyState !== 1) return;
    try { this.ws.send(str); this.packetsSent++; } catch(_) {}
  }

  _setStatus(s) { this.status = s; }

  disconnect() {
    this._dead = true;
    this._stopTimers();
    if (this.ws) { try { this.ws.close(); } catch(_) {} this.ws = null; }
    this._setStatus('stopped');
  }
}

// ── Snapshot flush (1 Hz) ─────────────────────────────────────
let flushTimer = null;

function startFlush() {
  if (flushTimer) return;
  flushTimer = setInterval(() => {
    const snapshots = [];
    clients.forEach(c => snapshots.push({
      id:          c.id,
      status:      c.status,
      slot:        c.slot,
      packetsSent: c.packetsSent,
      sample_rate: c.cfg.sample_rate,
      phase:       c.gen ? c.gen.phaseName : '',
    }));
    const newLogs = logs.splice(0);
    sendMsg({ type: 'snapshot', clients: snapshots, logs: newLogs });
  }, 1000);
}

function stopFlush() {
  if (flushTimer) { clearInterval(flushTimer); flushTimer = null; }
}

// ── Worker message handler ────────────────────────────────────
onmessage = (ev) => {
  const m = ev.data;

  if (m.type === 'start_many') {
    // Start multiple specific IDs (used by "Start All")
    for (let i = 0; i < m.ids.length; i++) {
      const id = m.ids[i];
      if (clients.has(id)) {
        const existing = clients.get(id);
        if (existing.status === 'connected' || existing.status === 'connecting') continue;
        existing.disconnect();
      }
      const c = new VClient(id, m.url);
      clients.set(id, c);
      setTimeout(() => c.connect(), i * m.stagger);
    }
    startFlush();
    logLine('info', `Connecting ${m.ids.length} virtual device(s)…`);

  } else if (m.type === 'start_one') {
    // Start a single device
    if (clients.has(m.id)) {
      const existing = clients.get(m.id);
      if (existing.status === 'connected' || existing.status === 'connecting') return;
      existing.disconnect();
    }
    const c = new VClient(m.id, m.url);
    clients.set(m.id, c);
    c.connect();
    startFlush();
    logLine('info', `#${m.id} connecting…`);

  } else if (m.type === 'stop_one') {
    const c = clients.get(m.id);
    if (c) { c.disconnect(); }
    logLine('warn', `#${m.id} stopped`);

  } else if (m.type === 'stop_all') {
    clients.forEach(c => c.disconnect());
    setTimeout(() => stopFlush(), 1100);
    logLine('warn', 'All devices stopped.');

  } else if (m.type === 'clear') {
    clients.clear();
    logs = [];
    sendMsg({ type: 'snapshot', clients: [], logs: [] });
    stopFlush();
  }
};
</script>

<!-- ─────────────────────────────────────────────────────── -->
<!-- Main thread — UI only                                    -->
<!-- ─────────────────────────────────────────────────────── -->
<script>
'use strict';

// ── Worker boot ───────────────────────────────────────────────
const workerSrc  = document.getElementById('worker-code').textContent;
const workerBlob = new Blob([workerSrc], { type: 'application/javascript' });
const worker     = new Worker(URL.createObjectURL(workerBlob));

// ── DOM refs ─────────────────────────────────────────────────
const urlInput     = document.getElementById('url-input');
const slider       = document.getElementById('client-slider');
const countLabel   = document.getElementById('client-count-label');
const staggerInput = document.getElementById('stagger-input');
const btnStart     = document.getElementById('btn-start');
const btnStop      = document.getElementById('btn-stop');
const btnClear     = document.getElementById('btn-clear');
const grid         = document.getElementById('client-grid');
const logEl        = document.getElementById('log-footer');
const sConn  = document.getElementById('stat-connected');
const sTgt   = document.getElementById('stat-target');
const sPps   = document.getElementById('stat-pps');
const sTotal = document.getElementById('stat-total');
const sElap  = document.getElementById('stat-elapsed');

// ── State ─────────────────────────────────────────────────────
let anyRunning    = false; // true = at least one client active
let startTime     = null;
let elapsedTimer  = null;
const cardEls     = new Map(); // id → { root, dot, slot, status, packets, phase, hz, btn }
let logLines      = [];
const MAX_LOGS    = 80;

urlInput.value = localStorage.getItem('w2td_lt_url') || '';

// ── Slider / count sync ───────────────────────────────────────
slider.addEventListener('input', () => { countLabel.value = slider.value; syncGrid(); });
countLabel.addEventListener('input', () => {
  let v = parseInt(countLabel.value);
  if (isNaN(v)) return;
  v = clampCount(v);
  slider.value = v;
  syncGrid();
});
slider.addEventListener('change', () => syncGrid());
countLabel.addEventListener('change', () => {
  let v = parseInt(countLabel.value);
  if (isNaN(v) || v < 1) v = 1;
  countLabel.value = clampCount(v);
  slider.value = countLabel.value;
  syncGrid();
});

function clampCount(v) { return Math.max(1, Math.min(100, v)); }

// ── Grid sync: add/remove cards to match slider count ────────
function syncGrid() {
  const target  = parseInt(slider.value);
  const current = cardEls.size;
  if (target === current) { sTgt.textContent = target; return; }

  if (target > current) {
    const ids = [];
    for (let i = current + 1; i <= target; i++) ids.push(i);
    addCards(ids);
  } else {
    const ids = [];
    for (let i = target + 1; i <= current; i++) ids.push(i);
    removeCards(ids);
    // Stop worker-side clients for removed IDs
    for (const id of ids) worker.postMessage({ type: 'stop_one', id });
  }
  sTgt.textContent = target;
}

function addCards(ids) {
  const frag = document.createDocumentFragment();
  for (const id of ids) {
    const card = document.createElement('div');
    card.className = 'client-card idle';
    card.dataset.id = id;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-id">#${id}</span>
        <div class="card-header-right">
          <button class="card-btn" title="Connect this device">▶</button>
          <span class="card-dot"></span>
        </div>
      </div>
      <div class="card-slot none">—</div>
      <div class="card-status">Idle</div>
      <div class="card-phase"></div>
      <div class="card-packets"></div>
      <div class="card-hz"></div>`;
    frag.appendChild(card);
    cardEls.set(id, {
      root:    card,
      dot:     card.querySelector('.card-dot'),
      slot:    card.querySelector('.card-slot'),
      status:  card.querySelector('.card-status'),
      phase:   card.querySelector('.card-phase'),
      packets: card.querySelector('.card-packets'),
      hz:      card.querySelector('.card-hz'),
      btn:     card.querySelector('.card-btn'),
    });
  }
  // Remove empty-state placeholder if present
  const empty = grid.querySelector('.empty-state');
  if (empty) grid.removeChild(empty);
  grid.appendChild(frag);
}

function removeCards(ids) {
  for (const id of ids) {
    const el = cardEls.get(id);
    if (el && el.root.parentNode) el.root.parentNode.removeChild(el.root);
    cardEls.delete(id);
  }
  if (cardEls.size === 0) {
    grid.innerHTML = `<div class="empty-state"><p>No virtual devices</p><small>Set count above to add device cards</small></div>`;
  }
}

// ── Card click / toggle button ────────────────────────────────
grid.addEventListener('click', (e) => {
  // Toggle button click OR whole-card click
  const card = e.target.closest('.client-card');
  if (!card) return;
  const id = parseInt(card.dataset.id);
  toggleDevice(id);
});

function toggleDevice(id) {
  const el = cardEls.get(id);
  if (!el) return;
  const status = el.root.className.split(' ')[1] || 'idle'; // e.g. 'idle', 'connected'
  const url = urlInput.value.trim();

  if (status === 'connected' || status === 'connecting') {
    // Stop this device
    worker.postMessage({ type: 'stop_one', id });
    updateCardUI(el, { status: 'stopped' });
  } else {
    // Start this device
    if (!url || !url.startsWith('ws')) {
      alert('Enter a wss:// or ws:// TouchDesigner URL first.');
      return;
    }
    localStorage.setItem('w2td_lt_url', url);
    worker.postMessage({ type: 'start_one', id, url });
    updateCardUI(el, { status: 'connecting' });
    // Start elapsed timer if not already running
    if (!elapsedTimer) { startTime = Date.now(); startElapsedTimer(); }
    anyRunning = true;
    btnStop.disabled = false;
  }
}

// ── Global buttons ────────────────────────────────────────────
btnStart.addEventListener('click', startAll);
btnStop.addEventListener('click',  stopAll);
btnClear.addEventListener('click', clearAll);

function startAll() {
  const url = urlInput.value.trim();
  if (!url || !url.startsWith('ws')) { alert('Enter a wss:// or ws:// URL'); return; }
  localStorage.setItem('w2td_lt_url', url);

  const stagger = parseInt(staggerInput.value) || 0;

  // Collect IDs that are idle/stopped/error (not already running)
  const ids = [];
  cardEls.forEach((el, id) => {
    const status = el.root.className.split(' ')[1] || 'idle';
    if (status !== 'connected' && status !== 'connecting') ids.push(id);
  });

  if (ids.length === 0) return; // all already running

  worker.postMessage({ type: 'start_many', ids, url, stagger });

  // Optimistic UI update
  ids.forEach(id => {
    const el = cardEls.get(id);
    if (el) updateCardUI(el, { status: 'connecting' });
  });

  anyRunning = true;
  if (!elapsedTimer) { startTime = Date.now(); startElapsedTimer(); }
  btnStop.disabled = false;
  btnClear.disabled = true;
}

function stopAll() {
  worker.postMessage({ type: 'stop_all' });
  anyRunning = false;
  stopElapsedTimer();
  btnStop.disabled  = true;
  btnClear.disabled = false;
  // Optimistic UI — snapshots will confirm stopped state
  cardEls.forEach(el => {
    const status = el.root.className.split(' ')[1] || 'idle';
    if (status === 'connected' || status === 'connecting') {
      updateCardUI(el, { status: 'stopped' });
    }
  });
}

function clearAll() {
  worker.postMessage({ type: 'clear' });
  cardEls.forEach(el => { if (el.root.parentNode) el.root.parentNode.removeChild(el.root); });
  cardEls.clear();
  grid.innerHTML = `<div class="empty-state"><p>No virtual devices</p><small>Set count above to add device cards</small></div>`;
  sConn.textContent  = '0';
  sTgt.textContent   = '0';
  sPps.textContent   = '0';
  sTotal.textContent = '0';
  sElap.textContent  = '00:00';
  btnClear.disabled = true;
  btnStop.disabled  = true;
  stopElapsedTimer();
}

// ── Card UI updater ───────────────────────────────────────────
const STATUS_TEXT = {
  idle: 'Idle', connecting: 'Connecting…', connected: 'Connected',
  rejected: 'Rejected', error: 'Error', stopped: 'Stopped',
};
const BTN_ICON = {
  connecting: '⏹', connected: '⏹',
};

function updateCardUI(el, c) {
  if (!el) return;
  const status = c.status || 'idle';
  const cls = `client-card ${status}`;
  if (el.root.className !== cls) el.root.className = cls;

  const stxt = STATUS_TEXT[status] || status;
  if (el.status.textContent !== stxt) el.status.textContent = stxt;

  // Toggle button icon
  const btnIcon = (status === 'connected' || status === 'connecting') ? '⏹' : '▶';
  if (el.btn.textContent !== btnIcon) el.btn.textContent = btnIcon;

  if (c.slot != null) {
    const ss = String(c.slot);
    if (el.slot.textContent !== ss) el.slot.textContent = ss;
    el.slot.classList.remove('none');
  }

  if (status === 'connected') {
    if (c.packetsSent != null) {
      const pkt = c.packetsSent.toLocaleString() + ' pkts';
      if (el.packets.textContent !== pkt) el.packets.textContent = pkt;
    }
    if (c.sample_rate != null) {
      const hz = c.sample_rate + ' Hz';
      if (el.hz.textContent !== hz) el.hz.textContent = hz;
    }
    if (c.phase != null && el.phase.textContent !== c.phase) el.phase.textContent = c.phase;
  } else {
    if (el.phase.textContent) el.phase.textContent = '';
  }
}

// ── Worker → Main: 1 Hz snapshot ─────────────────────────────
worker.onmessage = (ev) => {
  const m = ev.data;
  if (m.type !== 'snapshot') return;
  handleSnapshot(m);
};

function handleSnapshot(m) {
  let connectedCount = 0;
  let totalPackets   = 0;
  let expectedPps    = 0;
  let hasAnyRunning  = false;

  for (const c of m.clients) {
    if (c.status === 'connected') { connectedCount++; expectedPps += c.sample_rate; }
    if (c.status === 'connected' || c.status === 'connecting') hasAnyRunning = true;
    totalPackets += c.packetsSent;
    const el = cardEls.get(c.id);
    if (el) updateCardUI(el, c);
  }

  sConn.textContent  = connectedCount;
  sPps.textContent   = expectedPps.toLocaleString();
  sTotal.textContent = totalPackets.toLocaleString();

  // Sync stop button
  if (!hasAnyRunning && anyRunning) {
    anyRunning = false;
    btnStop.disabled  = true;
    btnClear.disabled = false;
  } else if (hasAnyRunning) {
    btnStop.disabled  = false;
    btnClear.disabled = true;
  }

  if (m.logs && m.logs.length) {
    for (const l of m.logs) logLines.unshift(l);
    if (logLines.length > MAX_LOGS) logLines.length = MAX_LOGS;
    renderLogs();
  }
}

function renderLogs() {
  let html = '';
  for (const l of logLines) {
    html += `<div class="log-line ${l.level}"><span class="log-ts">${l.ts}</span>${esc(l.text)}</div>`;
  }
  logEl.innerHTML = html;
}
function esc(s) {
  return String(s).replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c]));
}

// ── Elapsed timer ─────────────────────────────────────────────
function startElapsedTimer() {
  if (elapsedTimer) return;
  elapsedTimer = setInterval(() => {
    const s  = Math.floor((Date.now() - startTime) / 1000);
    const mm = Math.floor(s / 60);
    sElap.textContent = String(mm).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
  }, 1000);
}
function stopElapsedTimer() {
  if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
}

// ── Init: pre-populate grid on load ──────────────────────────
syncGrid();
</script>
